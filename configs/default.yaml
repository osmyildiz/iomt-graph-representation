# Default configuration for iomt-graph-representation experiments
# Adjust paths to match your environment

paths:
  csv_dir: "/network/rit/dgx/dgx_subasi_lab/osman/osman-net/data/csv"
  pcap_dir: "/path/to/WiFI_and_MQTT/attacks/pcap"
  ip_extracted_dir: "/path/to/ip_extracted"
  graph_dir: "/network/rit/dgx/dgx_subasi_lab/osman/osman-net/data/natural_graphs"
  results_dir: "/network/rit/dgx/dgx_subasi_lab/osman/osman-net/results"

preprocessing:
  drop_columns:
    - "Srate"
    - "Drate"
    - "rst_count"
    - "ack_count"
    - "syn_count"
    - "fin_count"
    - "psh_count"
    - "urg_count"
    - "TnP_Per_Dport"
    - "TnP_Per_Sport"
    - "TnP_PerProto"
    - "TnP_Per_Sip"
    - "TnP_Per_Dip"
    - "AR_P_Proto_P_Sport"

similarity_graph:
  window_size: 500
  stride: 250
  k_neighbors: 10
  protocol_homophily: true

natural_graph:
  window_seconds: 60
  min_edges: 2
  min_nodes: 2

domain_edges:
  known_gateways: ["10.0.0.254"]
  internal_prefixes: ["192.168.137.", "10.0.0."]
  proxy_scale: 0.1  # structural edges = mean_ef * this
  edge_types: ["communication", "same_subnet", "gateway_linked"]

model:
  hidden_dim: 128
  num_layers: 3
  num_heads: 4
  dropout: 0.3
  alpha_init: 0.5  # adaptive edge weight fusion

training:
  lr: 0.0005
  weight_decay: 0.0001
  epochs: 300
  patience: 40
  batch_size: 32
  gradient_clip: 1.0
  scheduler: cosine

evaluation:
  val_ratio: 0.15
  seeds: [42, 123, 456, 789, 2026]
  diagnostic_seeds: [42, 123, 456]
  pcap_level_split: true

task:
  full_6class: ["Benign", "DDoS", "DoS", "MQTT", "Recon", "Spoofing"]
  topology_heavy_4class: ["Benign", "DDoS", "DoS", "Recon"]
  binary: ["Benign", "Attack"]

rf_baseline:
  n_estimators: 300
  class_weight: "balanced"
  n_jobs: 16
